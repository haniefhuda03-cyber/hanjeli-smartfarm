# ═══════════════════════════════════════════
# Eclipse Mosquitto — Konfigurasi MQTT Broker
# Hanjeli SmartFarm IoT
# ═══════════════════════════════════════════

# ─── Listener utama (MQTT protocol) ───
listener 1883
protocol mqtt

# ─── Listener WebSocket (untuk debug via browser) ───
listener 9001
protocol websockets

# ─── Keamanan: Wajib login dengan username/password ───
# Jangan izinkan koneksi anonim (tanpa login)
allow_anonymous false
password_file /mosquitto/config/password.txt

# ─── Logging ───
log_dest stdout
log_type error
log_type warning
log_type notice
connection_messages true
log_timestamp true

# ─── Persistence (simpan pesan yang belum terkirim) ───
persistence true
persistence_location /mosquitto/data/

# ─── Batas pesan ───
max_inflight_messages 20
max_queued_messages 1000
